<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EVG Multiplayer Browser Harness</title>
    <style>
      body {
        margin: 0;
        background: #f4f6f6;
        color: #182326;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      header {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        background: #ffffff;
        border-bottom: 1px solid #d8e0e0;
      }
      h1 {
        margin: 0;
        font-size: 18px;
      }
      button {
        border: 0;
        border-radius: 6px;
        background: #176b63;
        color: #ffffff;
        padding: 8px 12px;
        font-weight: 700;
        cursor: pointer;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 12px;
      }
      .pane {
        min-height: 420px;
        border: 1px solid #cfd8d8;
        border-radius: 8px;
        overflow: hidden;
        background: #ffffff;
      }
      .pane h2 {
        margin: 0;
        padding: 8px 10px;
        background: #203033;
        color: #ffffff;
        font-size: 14px;
      }
      iframe {
        width: 100%;
        height: 540px;
        border: 0;
      }
      .note {
        padding: 0 16px 12px;
        color: #536569;
        font-size: 13px;
      }
      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>EVG Multiplayer Browser Harness</h1>
      <div>
        <button type="button" id="reset">Reset Local Room</button>
        <button type="button" id="reload">Reload Frames</button>
      </div>
    </header>
    <p class="note">
      リポジトリ直下で <code>python3 -m http.server 8000</code> を起動し、
      <code>http://127.0.0.1:8000/tests/multiplayer-browser-harness.html</code> を開く。
      Player A/B/C は <code>testSlot</code> ごとにUUID保存先を分けるため、同一ブラウザ内で複数プレイヤーを操作できる。
    </p>
    <main class="grid">
      <section class="pane">
        <h2>Host</h2>
        <iframe data-src="../game/index.html?view=host" title="Host"></iframe>
      </section>
      <section class="pane">
        <h2>Screen</h2>
        <iframe data-src="../game/index.html?view=screen" title="Screen"></iframe>
      </section>
      <section class="pane">
        <h2>Player A</h2>
        <iframe data-src="../game/index.html?view=player&testSlot=player-a" title="Player A"></iframe>
      </section>
      <section class="pane">
        <h2>Player B</h2>
        <iframe data-src="../game/index.html?view=player&testSlot=player-b" title="Player B"></iframe>
      </section>
      <section class="pane">
        <h2>Player C</h2>
        <iframe data-src="../game/index.html?view=player&testSlot=player-c" title="Player C"></iframe>
      </section>
    </main>
    <script>
      const frameSources = Array.from(document.querySelectorAll("iframe"));
      function loadFrames() {
        frameSources.forEach((frame) => {
          frame.src = frame.dataset.src;
        });
      }
      document.getElementById("reload").addEventListener("click", loadFrames);
      document.getElementById("reset").addEventListener("click", () => {
        [
          "evg.room.v1",
          "evg.playerUuid.v1",
          "evg.playerUuid.v1.player-a",
          "evg.playerUuid.v1.player-b",
          "evg.playerUuid.v1.player-c",
          "evg.hostAuthed.v1",
          "evg.logs.v1",
          "evg.screenReady.v1",
        ].forEach((key) => localStorage.removeItem(key));
        loadFrames();
      });
      loadFrames();
    </script>
  </body>
</html>
